<div class="flex-row">
  <div class="flex-1">
    <form [formGroup]="addInventoryForm" (ngSubmit)="submitForm();">
      <mat-card class="add-inventory-card">
        <mat-card-header>
          <mat-card-title class="add-inventory-title">New Inventory</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="flex-col">
            <mat-form-field>
              <mat-label>Item Key</mat-label>
              <input matInput formControlName="itemKey"
                data-test="itemKeyInput"
                required>
              @if (formControlHasError('itemKey')) {
                <mat-error data-test="nameError">
                  {{getErrorMessage('itemKey')}}
                </mat-error>
              }
            </mat-form-field>

            <mat-form-field>
              <mat-label>Item Name</mat-label>
              <input matInput formControlName="itemName"
                data-test="itemNameInput"
                required>
              @if (formControlHasError('itemName')) {
                <mat-error data-test="nameError">
                  {{getErrorMessage('itemName')}}
                </mat-error>
              }
            </mat-form-field>

            <mat-form-field>
              <mat-label>Quantity</mat-label>
              <input matInput type="number"
                formControlName="quantityAvailable"
                data-test="quantityInput"
                required>
              @if (formControlHasError('quantityAvailable')) {
                <mat-error data-test="ageError">
                  {{getErrorMessage('quantityAvailable')}}
                </mat-error>
              }
            </mat-form-field>
          </div>
    </mat-card-content>

        <mat-card-actions align="end">
          <button
            mat-button
            color="primary"
            [disabled]="!addInventoryForm.valid"
            type="submit"
            data-test="confirmAddInventoryButton"
            >
            ADD INVENTORY
          </button>
        </mat-card-actions>
      </mat-card>
    </form>
  </div>
</div>

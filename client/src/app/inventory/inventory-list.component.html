<mat-card class="inventory-container">
  <mat-card-header>
    <mat-card-title class="inventory-list-title">Inventory</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    @if (inventoryItems()) {

      <div class="inventory-table">

        <div class="inventory-header">
          <span>Name</span>
          <span>Key</span>
          <span>Quantity</span>
          <span>Actions</span>
        </div>

        @for (item of inventoryItems(); track item._id) {

          <div class="inventory-row" data-test="inventoryRow">

            <span class="item-name">{{ item.itemName }}</span>

            <span class="item-key">{{ item.itemKey }}</span>

            <div class="quantity-controls">
              <button mat-icon-button
                      data-test="minusButton"
                      (click)="updateQuantity(item._id!, item.quantityAvailable - 1)"
                      [disabled]="item.quantityAvailable === 0">
                <mat-icon>remove</mat-icon>
              </button>

              <span class="quantity-number">
                {{ item.quantityAvailable }}
              </span>

              <button mat-icon-button
                      data-test="plusButton"
                      (click)="updateQuantity(item._id!, item.quantityAvailable + 1)">
                <mat-icon>add</mat-icon>
              </button>
            </div>

            <button mat-icon-button
                    data-test="deleteButton"
                    color="warn"
                    (click)="confirmDelete(item._id!)">
              <mat-icon>delete</mat-icon>
            </button>

          </div>
        }

      </div>

    } @else {
      <mat-error>
        Inventory is empty or could not load.
      </mat-error>
    }

  </mat-card-content>

  <button mat-mini-fab data-test="addInventoryButton"
          color="primary"
          class="add-button"
          routerLink="/inventory/new">
    <mat-icon>add</mat-icon>
  </button>
</mat-card>
